server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API surfaces proxied to the Go backend
  location /api/          { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
  location /v1/           { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
  location /graphql       { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
  location /playground    { proxy_pass http://127.0.0.1:8080; }
  location /docs          { proxy_pass http://127.0.0.1:8080; }
  location /openapi.yaml  { proxy_pass http://127.0.0.1:8080; }
  location /.well-known/  { proxy_pass http://127.0.0.1:8080; }
  location /autopilot     { proxy_pass http://127.0.0.1:8080; }
  location /events {       # SSE realtime
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1; proxy_set_header Connection ''; chunked_transfer_encoding off;
  }

  location / { try_files $uri /index.html; }   # SPA
}
